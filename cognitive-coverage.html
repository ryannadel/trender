:root{--bg:#0a1628;--surface:#111d2e;--surface2:#162438;--border:rgba(100,160,220,0.15);--text:#d0dff0;--text-dim:#7a96b0;--accent:#5bb8ff;--accent2:#3dd68c;--warn:#ffb347;--danger:#ff6b6b;--code-bg:#0d1926;--green-bg:rgba(61,214,140,0.08);--amber-bg:rgba(255,179,71,0.08);--red-bg:rgba(255,107,107,0.08);--blue-bg:rgba(91,184,255,0.06)}body{margin:0;background:var(--bg);color:var(--text);font-family:Segoe UI,system-ui,sans-serif;line-height:1.55}main{max-width:1180px;margin:0 auto;padding:32px}h1{margin:0 0 8px}.hero,.panel,.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;margin:14px 0}.top{display:grid;grid-template-columns:220px 1fr;gap:18px}.bars{display:grid;gap:12px}.bar{background:var(--surface2);border-radius:999px;overflow:hidden;height:12px}.fill{height:100%;background:var(--accent2)}.tabs{display:flex;gap:8px;flex-wrap:wrap}.tabs button,.status button,.actions button{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:9px;padding:8px 12px;cursor:pointer}.tabs button.active{background:var(--accent);color:#06101e}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}.card.uncovered{border-color:rgba(255,107,107,.45);background:var(--red-bg)}.card.read,.card.taught,.card.traced{border-color:rgba(255,179,71,.45);background:var(--amber-bg)}.card.understood,.card.quiz-verified,.card.verified{border-color:rgba(61,214,140,.45);background:var(--green-bg)}.badge{display:inline-block;border:1px solid var(--border);border-radius:999px;padding:2px 8px;color:var(--text-dim);font-size:12px}a{color:var(--accent)}.timeline{display:flex;gap:8px;overflow:auto}.step{min-width:180px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:10px}.hidden{display:none}input[type=file]{margin:8px 0;color:var(--text)}pre{white-space:pre-wrap;background:var(--code-bg);padding:12px;border-radius:10px}@media(max-width:760px){.top{grid-template-columns:1fr}}
</style>

<section class="hero">

  <p>Tracks understanding coverage for Trender. Quiz results from <a href="learning-guide.html">learning-guide.html</a> sync through <code>localStorage</code>.</p>
  <div class="actions"><button onclick="exportManifest()">Export JSON</button> <label>Import JSON <input type="file" onchange="importManifest(event)"></label></div>
</section>
<section class="top">
  <div class="panel"><canvas id="donut" width="180" height="180"></canvas></div>
  <div class="panel"><h2>Coverage Axes</h2><div id="summaryBars" class="bars"></div></div>
</section>
<section class="panel">
  <div class="tabs">
    <button class="active" onclick="showTab('files',this)">Files</button>
    <button onclick="showTab('concepts',this)">Concepts</button>
    <button onclick="showTab('flows',this)">Flows</button>
    <button onclick="showTab('gaps',this)">Gap Report</button>
  </div>
</section>
<section id="files" class="tab"></section>
<section id="concepts" class="tab hidden"></section>
<section id="flows" class="tab hidden"></section>
<section id="gaps" class="tab hidden"></section>

<script>
var LS_KEY='cognitive-coverage-state';
var manifest=JSON.parse(document.getElementById('manifest-data').textContent);
function getState(){try{return JSON.parse(localStorage.getItem(LS_KEY))||{}}catch(e){return{}}}
function setState(s){localStorage.setItem(LS_KEY,JSON.stringify(s))}
function applyQuizSync(){var s=getState(),qr=s.quizResults||{};manifest.concepts.forEach(function(c){if(c.quizIds&&c.quizIds.length&&c.quizIds.every(function(q){return qr[q]&&qr[q].correct}))c.status='quiz-verified'});manifest.flows.forEach(function(f){if(f.quizIds&&f.quizIds.length&&f.quizIds.every(function(q){return qr[q]&&qr[q].correct}))f.status='verified'})}
function pct(done,total){return total?Math.round(done/total*100):0}
function recompute(){var fc=manifest.files.filter(function(x){return x.status==='understood'}).length,cc=manifest.concepts.filter(function(x){return x.status==='quiz-verified'}).length,flc=manifest.flows.filter(function(x){return x.status==='verified'}).length;manifest.summary.files={total:manifest.files.length,covered:fc,percentage:pct(fc,manifest.files.length)};manifest.summary.concepts={total:manifest.concepts.length,covered:cc,percentage:pct(cc,manifest.concepts.length)};manifest.summary.flows={total:manifest.flows.length,covered:flc,percentage:pct(flc,manifest.flows.length)};manifest.summary.overall=Math.round((manifest.summary.files.percentage+manifest.summary.concepts.percentage+manifest.summary.flows.percentage)/3)}
function drawDonut(){var c=document.getElementById('donut'),ctx=c.getContext('2d'),p=manifest.summary.overall;ctx.clearRect(0,0,180,180);ctx.lineWidth=22;ctx.strokeStyle='#162438';ctx.beginPath();ctx.arc(90,90,60,0,Math.PI*2);ctx.stroke();ctx.strokeStyle=p>66?'#3dd68c':p>33?'#ffb347':'#ff6b6b';ctx.beginPath();ctx.arc(90,90,60,-Math.PI/2,-Math.PI/2+Math.PI*2*p/100);ctx.stroke();ctx.fillStyle='#d0dff0';ctx.font='bold 24px Segoe UI';ctx.textAlign='center';ctx.fillText(p+'%',90,98)}
function bars(){summaryBars.innerHTML=['files','concepts','flows'].map(function(k){var s=manifest.summary[k];return '<div><strong>'+k+'</strong> '+s.covered+'/'+s.total+' ('+s.percentage+'%)<div class="bar"><div class="fill" style="width:'+s.percentage+'%"></div></div></div>'}).join('')}
function cardStatusButtons(kind,item){var statuses=kind==='files'?['uncovered','read','understood']:kind==='concepts'?['uncovered','taught','quiz-verified']:['uncovered','traced','verified'];return '<div class="status">'+statuses.map(function(st){return '<button onclick="setStatus(\\''+kind+'\\',\\''+item.idOrPath+'\\',\\''+st+'\\')">'+st+'</button>'}).join(' ')+'</div>'}
function renderFiles(){files.innerHTML='<div class="grid">'+manifest.files.map(function(f){f.idOrPath=f.path;return '<article class="card '+f.status+'"><h3>'+f.path+'</h3><span class="badge">'+f.status+'</span><p>'+f.description+'</p><p>Concepts: '+f.relatedConcepts.join(', ')+'</p><p><a href="learning-guide.html#'+f.guideSection+'">Launch Teaching</a></p>'+cardStatusButtons('files',f)+'</article>'}).join('')+'</div>'}
function renderConcepts(){concepts.innerHTML='<div class="grid">'+manifest.concepts.map(function(c){c.idOrPath=c.id;return '<article class="card '+c.status+'"><h3>'+c.name+'</h3><span class="badge">'+c.status+'</span><p>'+c.description+'</p><p>Files: '+c.files.join(', ')+'</p><p>Quiz: '+c.quizIds.join(', ')+'</p><p><a href="learning-guide.html#'+c.guideSection+'">Learn</a></p>'+cardStatusButtons('concepts',c)+'</article>'}).join('')+'</div>'}
function renderFlows(){flows.innerHTML=manifest.flows.map(function(f){f.idOrPath=f.id;return '<article class="card '+f.status+'"><h3>'+f.name+'</h3><span class="badge">'+f.status+'</span><p>'+f.description+'</p><div class="timeline">'+f.steps.map(function(s,i){return '<div class="step"><strong>Step '+(i+1)+'</strong><br>'+s.description+'<br><span class="badge">'+s.file+'</span></div>'}).join('')+'</div><p><a href="learning-guide.html#'+f.guideSection+'">Learn</a></p>'+cardStatusButtons('flows',f)+'</article>'}).join('')}
function renderGaps(){var uf=manifest.files.filter(function(x){return x.status!=='understood'}),uc=manifest.concepts.filter(function(x){return x.status!=='quiz-verified'}),ul=manifest.flows.filter(function(x){return x.status!=='verified'});gaps.innerHTML='<div class="panel"><h2>Uncovered Files</h2>'+uf.map(function(x){return '<p><a href="learning-guide.html#'+x.guideSection+'">'+x.path+'</a> - '+x.status+'</p>'}).join('')+'<h2>Uncovered Concepts</h2>'+uc.map(function(x){return '<p><a href="learning-guide.html#'+x.guideSection+'">'+x.name+'</a> - '+x.status+'</p>'}).join('')+'<h2>Uncovered Flows</h2>'+ul.map(function(x){return '<p><a href="learning-guide.html#'+x.guideSection+'">'+x.name+'</a> - '+x.status+'</p>'}).join('')+'</div>'}
function setStatus(kind,id,status){manifest[kind].forEach(function(x){if((kind==='files'?x.path:x.id)===id){x.status=status;x.updatedAt=new Date().toISOString()}});var s=getState();s.manifest=manifest;setState(s);renderAll()}
function renderAll(){applyQuizSync();recompute();drawDonut();bars();renderFiles();renderConcepts();renderFlows();renderGaps()}
function showTab(id,btn){document.querySelectorAll('.tab').forEach(function(t){t.classList.add('hidden')});document.getElementById(id).classList.remove('hidden');document.querySelectorAll('.tabs button').forEach(function(b){b.classList.remove('active')});btn.classList.add('active')}
function exportManifest(){var blob=new Blob([JSON.stringify(manifest,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='cognitive-coverage.json';a.click();URL.revokeObjectURL(a.href)}
function importManifest(e){var file=e.target.files[0];if(!file)return;var r=new FileReader();r.onload=function(){manifest=JSON.parse(r.result);renderAll()};r.readAsText(file)}
renderAll();
</script>
</main>
