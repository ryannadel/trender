var LS_KEY='cognitive-coverage-state';var manifest=JSON.parse(document.getElementById('manifest-data').textContent);
function getState(){try{return JSON.parse(localStorage.getItem(LS_KEY))||{}}catch(e){return{}}}function setState(s){localStorage.setItem(LS_KEY,JSON.stringify(s))}
function initFilters(){domain.textContent=manifest.domain||'codebase';filesTab.textContent=manifest.labels.files;conceptsTab.textContent=manifest.labels.concepts;flowsTab.textContent=manifest.labels.flows;diff.innerHTML=manifest.learningLevels.difficulty.map(x=>'<option value="'+x.id+'">'+x.label+'</option>').join('');depth.innerHTML=manifest.learningLevels.depth.map(x=>'<option value="'+x.id+'">'+x.label+'</option>').join('');diff.value=manifest.learningLevels.defaultDifficulty;depth.value=manifest.learningLevels.defaultDepth}
function allowed(x){return (!x.difficulty||x.difficulty===diff.value||x.difficulty==='beginner')&&(!x.depth||x.depth===depth.value||x.depth==='standard')}
function syncQuiz(){var qr=(getState().quizResults)||{};manifest.concepts.forEach(c=>{if(c.quizIds&&c.quizIds.length&&c.quizIds.every(q=>qr[q]&&qr[q].correct))c.status='quiz-verified'});manifest.flows.forEach(f=>{if(f.quizIds&&f.quizIds.length&&f.quizIds.every(q=>qr[q]&&qr[q].correct))f.status='verified'})}
function pct(done,total){return total?Math.round(done/total*100):0}function recompute(){var fc=manifest.files.filter(x=>x.status===manifest.statusLabels.files[2]).length,cc=manifest.concepts.filter(x=>x.status===manifest.statusLabels.concepts[2]).length,flc=manifest.flows.filter(x=>x.status===manifest.statusLabels.flows[2]).length;manifest.summary.files={total:manifest.files.length,covered:fc,percentage:pct(fc,manifest.files.length)};manifest.summary.concepts={total:manifest.concepts.length,covered:cc,percentage:pct(cc,manifest.concepts.length)};manifest.summary.flows={total:manifest.flows.length,covered:flc,percentage:pct(flc,manifest.flows.length)};manifest.summary.overall=Math.round((manifest.summary.files.percentage+manifest.summary.concepts.percentage+manifest.summary.flows.percentage)/3)}
function drawDonut(){var c=donut,ctx=c.getContext('2d'),p=manifest.summary.overall;ctx.clearRect(0,0,180,180);ctx.lineWidth=22;ctx.strokeStyle='#162438';ctx.beginPath();ctx.arc(90,90,60,0,Math.PI*2);ctx.stroke();ctx.strokeStyle=p>66?'#3dd68c':p>33?'#ffb347':'#ff6b6b';ctx.beginPath();ctx.arc(90,90,60,-Math.PI/2,-Math.PI/2+Math.PI*2*p/100);ctx.stroke();ctx.fillStyle='#d0dff0';ctx.font='bold 24px Segoe UI';ctx.textAlign='center';ctx.fillText(p+'%',90,98)}
function bars(){summaryBars.innerHTML=[['files',manifest.labels.files],['concepts',manifest.labels.concepts],['flows',manifest.labels.flows]].map(a=>{var s=manifest.summary[a[0]];return '<div><strong>'+a[1]+'</strong> '+s.covered+'/'+s.total+' ('+s.percentage+'%)<div class="bar"><div class="fill" style="width:'+s.percentage+'%"></div></div></div>'}).join('')}
function badges(x){return '<span class="badge">'+x.status+'</span><span class="badge">'+(x.difficulty||'')+'</span><span class="badge">'+(x.depth||'')+'</span>'}function btns(kind,x){var id=kind==='files'?x.path:x.id,sts=manifest.statusLabels[kind];return '<p>'+sts.map(st=>'<button onclick="setStatus(\''+kind+'\',\''+id+'\',\''+st+'\')">'+st+'</button>').join(' ')+'</p>'}
function renderAreas(){areas.innerHTML='<h2>Next learning targets</h2>'+manifest.areas.filter(allowed).sort((a,b)=>['critical','high','medium','low'].indexOf(a.priority)-['critical','high','medium','low'].indexOf(b.priority)).map(a=>'<article class="card '+a.status+'"><h3>'+a.name+'</h3>'+badges(a)+'<span class="badge">'+a.priority+'</span><p>'+a.description+'</p><p>'+a.rationale+'</p><p><a href="learning-guide.html#'+a.guideSection+'">Launch Teaching</a></p>'+btns('areas',a)+'</article>').join('')}
function renderModules(){modules.innerHTML='<div class="grid">'+manifest.modules.filter(allowed).map(m=>'<article class="card '+m.status+'"><h3>'+m.name+'</h3>'+badges(m)+'<span class="badge">'+m.priority+'</span><p>'+m.description+'</p><p>Files: '+m.filePaths.join(', ')+'</p><p><a href="'+m.guideFile+'#'+m.guideSection+'">Open module</a></p>'+btns('modules',m)+'</article>').join('')+'</div>'}
function renderFiles(){files.innerHTML='<div class="grid">'+manifest.files.filter(allowed).map(f=>'<article class="card '+f.status+'"><h3>'+f.path+'</h3>'+badges(f)+'<p>'+f.description+'</p><p>Concepts: '+f.relatedConcepts.join(', ')+'</p><p><a href="learning-guide.html#'+f.guideSection+'">Learn</a></p>'+btns('files',f)+'</article>').join('')+'</div>'}
function renderConcepts(){concepts.innerHTML='<div class="grid">'+manifest.concepts.filter(allowed).map(c=>'<article class="card '+c.status+'"><h3>'+c.name+'</h3>'+badges(c)+'<p>'+c.description+'</p><p>Quiz: '+c.quizIds.join(', ')+'</p><p><a href="learning-guide.html#'+c.guideSection+'">Learn</a></p>'+btns('concepts',c)+'</article>').join('')+'</div>'}
function renderFlows(){flows.innerHTML=manifest.flows.filter(allowed).map(f=>'<article class="card '+f.status+'"><h3>'+f.name+'</h3>'+badges(f)+'<p>'+f.description+'</p><div class="timeline">'+f.steps.map((s,i)=>'<div class="step"><strong>Step '+(i+1)+'</strong><br>'+s.description+'<br><span class="badge">'+s.file+'</span></div>').join('')+'</div><p><a href="learning-guide.html#'+f.guideSection+'">Learn</a></p>'+btns('flows',f)+'</article>').join('')}
function renderGaps(){var groups=[['Areas',manifest.areas,'understood'],['Modules',manifest.modules,'verified'],[manifest.labels.files,manifest.files,manifest.statusLabels.files[2]],[manifest.labels.concepts,manifest.concepts,manifest.statusLabels.concepts[2]],[manifest.labels.flows,manifest.flows,manifest.statusLabels.flows[2]]];gaps.innerHTML=groups.map(g=>'<div class="panel"><h2>'+g[0]+'</h2>'+g[1].filter(allowed).filter(x=>x.status!==g[2]).map(x=>'<p><a href="learning-guide.html#'+(x.guideSection||'why')+'">'+(x.name||x.path)+'</a> - '+x.status+' '+(x.priority?'<span class="badge">'+x.priority+'</span>':'')+'</p>').join('')+'</div>').join('')}
function setStatus(kind,id,status){manifest[kind].forEach(x=>{if((kind==='files'?x.path:x.id)===id){x.status=status;x.updatedAt=new Date().toISOString()}});var s=getState();s.manifest=manifest;setState(s);renderAll()}
function renderAll(){syncQuiz();recompute();drawDonut();bars();renderAreas();renderModules();renderFiles();renderConcepts();renderFlows();renderGaps()}function showTab(id,btn){document.querySelectorAll('.tab').forEach(t=>t.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));btn.classList.add('active')}
function exportManifest(){var blob=new Blob([JSON.stringify(manifest,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='cognitive-coverage.json';a.click();URL.revokeObjectURL(a.href)}function importManifest(e){var file=e.target.files[0];if(!file)return;var r=new FileReader();r.onload=function(){manifest=JSON.parse(r.result);renderAll()};r.readAsText(file)}initFilters();renderAll();
</script></main></body></html>
